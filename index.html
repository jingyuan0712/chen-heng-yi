<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>陳衡毅熊男</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #f28c28 50%, #1e90ff 50%);
  overflow: hidden;
}

/* 中線 */
body::before {
  content: "";
  position: fixed;
  top: 50%;
  width: 100%;
  height: 6px;
  background: white;
  z-index: -1;
}

/* 球網 */
.net {
  position: fixed;
  top: 50%;
  width: 100%;
  height: 60px;
  background: repeating-linear-gradient(
    to right,
    white,
    white 5px,
    transparent 5px,
    transparent 15px
  );
  opacity: 0.7;
  z-index: -1;
}

/* 排球 */
.ball {
  position: fixed;
  width: 80px;
  left: 50%;
  bottom: 100px;
  transform: translateX(-50%);
  transition: all 0.8s ease-out;
}

/* 旋轉 */
.spin {
  animation: spin 0.5s linear;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* 表格 */
table {
  border-collapse: collapse;
  width: 100%;
  background-color: rgba(255,255,255,0.85);
}

th, td {
  border: 1px solid black;
  padding: 15px;
}

/* 個人圖片 */
.profile {
  float: right;
  width: 240px;
  height: 360px;
}
</style>

</head>

<body>

<div class="net"></div>

<img src="volleyball.png" id="ball" class="ball">

<h1>這是陳衡毅熊男</h1>

<a href="https://www.instagram.com/chy._0517/?utm_source=ig_web_button_share_sheet" target="_blank">
點我前往 Instagram帳號
</a>

<br><br>

<img src="笑臉.jpg" class="profile">

<h2>這是他的行程表</h2>

<table>
  <tr>
    <th>Monday</th>
    <th>Tuesday</th>
    <th>Wednesday</th>
    <th>Thursday</th>
    <th>Friday</th>
    <th>Saturday</th>
    <th>Sunday</th>
  </tr>
  <tr>
    <td>Sleep</td>
    <td>Sleep</td>
    <td>Sleep</td>
    <td>Sleep</td>
    <td>Sleep</td>
    <td>Sleep</td>
    <td>Sleep</td>
  </tr>
</table>

<script>
const ball = document.getElementById("ball");

/* 點擊畫面擊球 */
document.addEventListener("click", function(e) {
  let x = e.clientX;
  let y = window.innerHeight - e.clientY;

  ball.style.left = x + "px";
  ball.style.bottom = y + "px";

  /* 加旋轉 */
  ball.classList.add("spin");

  setTimeout(() => {
    ball.classList.remove("spin");
  }, 500);
});
</script>

</body>
</html>
