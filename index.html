<title>陳衡毅熊男</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #74ebd5, #ACB6E5);
  overflow-x: hidden;
}

/* 排球動畫 */
.ball {
  position: fixed;
  width: 80px;
  bottom: 0;
  left: 0;
  animation: moveBall 6s linear infinite;
  opacity: 0.8;
  z-index: -1;
}

.ball2 {
  animation-delay: 3s;
}

/* 動畫軌跡 */
@keyframes moveBall {
  0% {
    left: 0;
    bottom: 0;
  }
  25% {
    bottom: 200px;
  }
  50% {
    left: 50%;
    bottom: 0;
  }
  75% {
    bottom: 200px;
  }
  100% {
    left: 100%;
    bottom: 0;
  }
}

/* 表格樣式 */
table {
  border-collapse: collapse;
  width: 100%;
  background-color: rgba(255, 255, 255, 0.8); /* 半透明 */
}

th, td {
  border: 1px solid black;
  padding: 15px;
  text-align: left;
}

/* 圖片 */
img.profile {
  float: right;
  width: 240px;
  height: 360px;
}
</style>

</head>

<body>

<!-- 會動的排球 -->
